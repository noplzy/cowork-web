name: Production source alignment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calmco-production-source-alignment
  cancel-in-progress: true

jobs:
  verify-production:
    name: Verify getcalmandco.com matches main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Wait for Vercel and verify production
        run: node scripts/verify-production-release.mjs
        env:
          PRODUCTION_URL: https://getcalmandco.com
          EXPECTED_GIT_SHA: ${{ github.sha }}
          RELEASE_WAIT_SECONDS: "900"
          RELEASE_POLL_SECONDS: "15"
